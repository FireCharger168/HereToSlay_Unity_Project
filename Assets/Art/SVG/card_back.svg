<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0d1b4b"/>
    </linearGradient>
    <pattern id="diamonds" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <polygon points="15,2 28,15 15,28 2,15" fill="none" stroke="#3a2060" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card base -->
  <rect x="4" y="4" width="292" height="412" rx="18" fill="url(#cardBg)" stroke="#6030b0" stroke-width="3"/>
  <rect x="4" y="4" width="292" height="412" rx="18" fill="url(#diamonds)" opacity="0.4"/>

  <!-- Inner border -->
  <rect x="14" y="14" width="272" height="392" rx="12" fill="none" stroke="#8050d0" stroke-width="1.5"/>

  <!-- Corner swords -->
  <g transform="translate(30,30) rotate(45)" filter="url(#glow)">
    <rect x="-2" y="-16" width="4" height="32" rx="2" fill="#c0a0ff"/>
    <polygon points="0,-16 6,-6 -6,-6" fill="#e0c0ff"/>
    <rect x="-6" y="10" width="12" height="3" rx="1" fill="#a080e0"/>
  </g>
  <g transform="translate(270,30) rotate(-45)" filter="url(#glow)">
    <rect x="-2" y="-16" width="4" height="32" rx="2" fill="#c0a0ff"/>
    <polygon points="0,-16 6,-6 -6,-6" fill="#e0c0ff"/>
    <rect x="-6" y="10" width="12" height="3" rx="1" fill="#a080e0"/>
  </g>
  <g transform="translate(30,390) rotate(135)" filter="url(#glow)">
    <rect x="-2" y="-16" width="4" height="32" rx="2" fill="#c0a0ff"/>
    <polygon points="0,-16 6,-6 -6,-6" fill="#e0c0ff"/>
    <rect x="-6" y="10" width="12" height="3" rx="1" fill="#a080e0"/>
  </g>
  <g transform="translate(270,390) rotate(-135)" filter="url(#glow)">
    <rect x="-2" y="-16" width="4" height="32" rx="2" fill="#c0a0ff"/>
    <polygon points="0,-16 6,-6 -6,-6" fill="#e0c0ff"/>
    <rect x="-6" y="10" width="12" height="3" rx="1" fill="#a080e0"/>
  </g>

  <!-- Central emblem -->
  <g transform="translate(150,210)" filter="url(#glow)">
    <!-- Shield -->
    <path d="M0,-60 L45,-30 L45,20 Q45,55 0,75 Q-45,55 -45,20 L-45,-30 Z"
          fill="#2a1050" stroke="#9060e0" stroke-width="2.5"/>
    <!-- Dragon silhouette -->
    <path d="M0,0 L-20,-25 L-30,-10 L-15,5 L-25,30 L0,20 L25,30 L15,5 L30,-10 L20,-25 Z
             M-35,-30 L-45,-20 M35,-30 L45,-20
             M-20,-35 L-15,-50 L-5,-40 M20,-35 L15,-50 L5,-40"
          fill="#7040c0" stroke="#b080ff" stroke-width="1.5"/>
    <!-- Star above shield -->
    <polygon points="0,-78 4,-70 12,-70 6,-64 8,-56 0,-61 -8,-56 -6,-64 -12,-70 -4,-70"
             fill="#ffd700" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- Title -->
  <text x="150" y="360" text-anchor="middle" font-family="Georgia, serif"
        font-size="22" font-weight="bold" fill="#e0c0ff" letter-spacing="3">
    HERE TO SLAY
  </text>
  <text x="150" y="385" text-anchor="middle" font-family="Georgia, serif"
        font-size="11" fill="#8060b0" letter-spacing="4">
    ✦ UNSTABLE GAMES ✦
  </text>

  <!-- Top divider -->
  <line x1="40" y1="42" x2="260" y2="42" stroke="#6040a0" stroke-width="0.8"/>
  <line x1="40" y1="370" x2="260" y2="370" stroke="#6040a0" stroke-width="0.8"/>
</svg>
