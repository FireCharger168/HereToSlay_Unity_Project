<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="itemBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a2e"/>
      <stop offset="50%" style="stop-color:#002a4a"/>
      <stop offset="100%" style="stop-color:#00102a"/>
    </linearGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0e0ff"/>
      <stop offset="40%" style="stop-color:#ffffff"/>
      <stop offset="70%" style="stop-color:#a0c0ff"/>
      <stop offset="100%" style="stop-color:#6090d0"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#80c0ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0050aa;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shimmer"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="292" height="412" rx="18" fill="url(#itemBg)" stroke="#2060aa" stroke-width="3"/>
  <rect x="14" y="14" width="272" height="392" rx="12" fill="none" stroke="#104080" stroke-width="1"/>

  <!-- Arcane circle background -->
  <circle cx="150" cy="200" r="110" fill="none" stroke="#103060" stroke-width="1.5" opacity="0.7"/>
  <circle cx="150" cy="200" r="85" fill="none" stroke="#1a4a7a" stroke-width="0.8" stroke-dasharray="5,5" opacity="0.5"/>
  <circle cx="150" cy="200" r="60" fill="none" stroke="#2060a0" stroke-width="0.6" opacity="0.4"/>

  <!-- Arcane rune marks on outer circle -->
  <g fill="#2080c0" opacity="0.6" font-size="14" text-anchor="middle" font-family="serif">
    <text transform="translate(150,92) rotate(0)">ᚱ</text>
    <text transform="translate(229,148) rotate(60)">ᚠ</text>
    <text transform="translate(229,252) rotate(120)">ᚢ</text>
    <text transform="translate(150,308) rotate(180)">ᚦ</text>
    <text transform="translate(71,252) rotate(240)">ᚨ</text>
    <text transform="translate(71,148) rotate(300)">ᚷ</text>
  </g>

  <!-- Glow aura behind sword -->
  <ellipse cx="150" cy="195" rx="50" ry="130" fill="url(#glowCenter)" opacity="0.35"/>

  <!-- THE VORPAL SWORD - centered and dramatic -->
  <g transform="translate(150, 195)">
    <!-- Blade glow -->
    <polygon points="0,-130 15,80 0,100 -15,80" fill="#4080ff" filter="url(#glow)" opacity="0.5"/>
    <!-- Main blade -->
    <polygon points="0,-130 12,75 0,92 -12,75" fill="url(#bladeGrad)"/>
    <!-- Blade center line / fuller -->
    <line x1="0" y1="-120" x2="0" y2="70" stroke="#e0f0ff" stroke-width="2" opacity="0.7"/>
    <!-- Blade edge bevel -->
    <polygon points="0,-130 3,-80 2,75 0,92" fill="#80b0ff" opacity="0.5"/>

    <!-- Magical runes on blade -->
    <g fill="none" stroke="#60a0ff" stroke-width="1" opacity="0.8">
      <path d="M-8,-60 L-4,-50 L4,-50 L8,-60 L0,-70Z"/>
      <path d="M-6,-30 L0,-20 L6,-30"/>
      <path d="M-6,5 L0,15 L6,5"/>
    </g>

    <!-- Crossguard - ornate -->
    <rect x="-38" y="72" width="76" height="14" rx="5" fill="#8b6914" stroke="#c8a820" stroke-width="1.5"/>
    <!-- Crossguard wings -->
    <path d="M-38,79 Q-55,72 -58,65 Q-48,68 -38,72Z" fill="#8b6914" stroke="#c8a820" stroke-width="1"/>
    <path d="M38,79 Q55,72 58,65 Q48,68 38,72Z" fill="#8b6914" stroke="#c8a820" stroke-width="1"/>
    <!-- Crossguard gem -->
    <circle cx="0" cy="79" r="7" fill="#4080ff" stroke="#80c0ff" stroke-width="1.5" filter="url(#shimmer)"/>
    <circle cx="0" cy="79" r="4" fill="#c0e0ff" opacity="0.8"/>

    <!-- Handle / grip -->
    <rect x="-7" y="86" width="14" height="40" rx="4" fill="#3a2010" stroke="#6a4a20" stroke-width="1"/>
    <!-- Grip wrapping -->
    <g stroke="#8b6914" stroke-width="2.5" fill="none" opacity="0.8">
      <path d="M-7,92 Q7,92 7,97 Q-7,97 -7,102 Q7,102 7,107 Q-7,107 -7,112 Q7,112 7,117"/>
    </g>

    <!-- Pommel - ornate sphere -->
    <circle cx="0" cy="130" r="14" fill="#8b6914" stroke="#c8a820" stroke-width="1.5"/>
    <circle cx="0" cy="130" r="9" fill="#c8a820"/>
    <circle cx="-3" cy="127" r="4" fill="#ffe060" opacity="0.6"/>

    <!-- Tip sparkle -->
    <g filter="url(#glow)">
      <polygon points="0,-135 3,-128 0,-120 -3,-128" fill="#ffffff"/>
      <circle cx="0" cy="-133" r="5" fill="#ffffff" opacity="0.7"/>
    </g>
  </g>

  <!-- Floating magical particles -->
  <g fill="#60a0ff" opacity="0.8" filter="url(#shimmer)">
    <circle cx="65" cy="130" r="3"/><circle cx="240" cy="155" r="2.5"/>
    <circle cx="55" cy="245" r="2"/><circle cx="255" cy="230" r="3"/>
    <circle cx="80" cy="290" r="2.5"/><circle cx="220" cy="280" r="2"/>
    <circle cx="100" cy="155" r="1.8"/><circle cx="205" cy="140" r="2.2"/>
  </g>

  <!-- NAME BANNER -->
  <rect x="18" y="344" width="264" height="56" rx="8" fill="#000d1a" stroke="#2060aa" stroke-width="2"/>
  <text x="150" y="366" text-anchor="middle" font-family="Georgia, serif"
        font-size="15" font-weight="bold" fill="#60a0ff" letter-spacing="2">⚔ VORPAL SWORD</text>
  <text x="150" y="388" text-anchor="middle" font-family="Georgia, serif"
        font-size="10" fill="#4080b0">[Persistent]  +2 to all slay rolls</text>

  <!-- MAGIC ITEM label -->
  <rect x="80" y="19" width="140" height="22" rx="6" fill="#001228" stroke="#104080" stroke-width="1.5"/>
  <text x="150" y="34" text-anchor="middle" font-family="Georgia, serif"
        font-size="10" fill="#4080c0" letter-spacing="3">✦ MAGIC ITEM ✦</text>

  <!-- Persistent badge -->
  <circle cx="258" cy="40" r="20" fill="#001228" stroke="#2060aa" stroke-width="2"/>
  <text x="258" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#60a0ff">PERS-</text>
  <text x="258" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#60a0ff">ISTENT</text>
</svg>
