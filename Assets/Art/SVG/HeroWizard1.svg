<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420">
  <defs>
    <linearGradient id="wizBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050520"/>
      <stop offset="50%" style="stop-color:#1a0a4a"/>
      <stop offset="100%" style="stop-color:#0a0030"/>
    </linearGradient>
    <radialGradient id="magicOrb" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#80c0ff"/>
      <stop offset="70%" style="stop-color:#4040ff"/>
      <stop offset="100%" style="stop-color:#000080"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="292" height="412" rx="18" fill="url(#wizBg)" stroke="#4040cc" stroke-width="3"/>

  <!-- Star field -->
  <g fill="#ffffff">
    <circle cx="30" cy="50" r="1.2"/><circle cx="80" cy="35" r="0.8"/><circle cx="120" cy="60" r="1.5"/>
    <circle cx="200" cy="40" r="1"/><circle cx="250" cy="70" r="0.8"/><circle cx="270" cy="45" r="1.3"/>
    <circle cx="45" cy="100" r="0.9"/><circle cx="170" cy="90" r="1.1"/><circle cx="235" cy="110" r="0.7"/>
    <circle cx="25" cy="150" r="1.3"/><circle cx="90" cy="140" r="0.8"/><circle cx="280" cy="160" r="1"/>
  </g>

  <!-- Magical runes circle -->
  <circle cx="150" cy="180" r="100" fill="none" stroke="#3030aa" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <circle cx="150" cy="180" r="80" fill="none" stroke="#5050cc" stroke-width="0.7" stroke-dasharray="3,6" opacity="0.4"/>

  <!-- Magic energy streams -->
  <path d="M60,280 Q80,200 150,180 Q220,200 240,280" fill="none" stroke="#6080ff" stroke-width="1.5" opacity="0.5"/>
  <path d="M50,260 Q90,195 150,175 Q210,195 250,260" fill="none" stroke="#80a0ff" stroke-width="0.8" opacity="0.3"/>

  <!-- WIZARD CHARACTER -->
  <!-- Flowing robes - deep blue/purple -->
  <path d="M110,230 Q90,280 85,310 L215,310 Q210,280 190,230Z"
        fill="#1a1060" stroke="#4040aa" stroke-width="1.5"/>
  <!-- Robe sparkles -->
  <g fill="#6080ff" opacity="0.6">
    <circle cx="115" cy="260" r="2"/><circle cx="140" cy="280" r="1.5"/>
    <circle cx="165" cy="265" r="2"/><circle cx="185" cy="285" r="1.5"/>
    <circle cx="130" cy="300" r="1.8"/><circle cx="175" cy="302" r="1.2"/>
  </g>

  <!-- Sleeves -->
  <path d="M110,230 Q85,235 65,215 Q60,240 70,260 Q85,255 110,255Z"
        fill="#1a1060" stroke="#4040aa" stroke-width="1"/>
  <path d="M190,230 Q215,235 235,215 Q240,240 230,260 Q215,255 190,255Z"
        fill="#1a1060" stroke="#4040aa" stroke-width="1"/>

  <!-- Torso -->
  <path d="M110,185 L110,235 Q150,245 190,235 L190,185 Q170,175 150,173 Q130,175 110,185Z"
        fill="#25186a" stroke="#5050b0" stroke-width="1.5"/>
  <!-- Star rune on chest -->
  <polygon points="150,195 153,204 163,204 155,210 158,220 150,214 142,220 145,210 137,204 147,204"
           fill="#8080ff" filter="url(#softglow)"/>

  <!-- Left hand with magic orb -->
  <circle cx="68" cy="225" r="18" fill="url(#magicOrb)" filter="url(#glow)"/>
  <circle cx="68" cy="225" r="22" fill="none" stroke="#8080ff" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
  <!-- Spark lines from orb -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.8" filter="url(#glow)">
    <line x1="50" y1="210" x2="40" y2="198"/><line x1="68" y1="205" x2="68" y2="192"/>
    <line x1="86" y1="210" x2="98" y2="198"/><line x1="52" y1="232" x2="40" y2="238"/>
    <line x1="86" y1="232" x2="98" y2="238"/>
  </g>

  <!-- Right arm and staff -->
  <g transform="translate(230,180) rotate(-10)">
    <!-- Staff -->
    <rect x="-4" y="-80" width="8" height="140" rx="4" fill="#4a3010" stroke="#6a4a20" stroke-width="1"/>
    <!-- Staff crystal topper -->
    <polygon points="0,-95 8,-75 0,-65 -8,-75" fill="#a0c0ff" filter="url(#glow)"/>
    <ellipse cx="0" cy="-80" rx="10" ry="6" fill="#6080ff" opacity="0.5" filter="url(#glow)"/>
    <!-- Wrapped binding -->
    <g stroke="#8b6914" stroke-width="3" fill="none" opacity="0.7">
      <path d="M-4,-20 Q4,-15 -4,-10 Q4,-5 -4,0 Q4,5 -4,10"/>
    </g>
  </g>

  <!-- Head -->
  <ellipse cx="150" cy="167" rx="26" ry="24" fill="#d4a876"/>
  <!-- Long beard -->
  <path d="M136,185 Q130,210 135,235 Q150,245 165,235 Q170,210 164,185Z"
        fill="#b0b0c0"/>
  <!-- Flowing hair -->
  <path d="M125,165 Q118,185 120,200 Q125,205 130,198 Q132,175 136,168Z" fill="#888898"/>
  <path d="M175,165 Q182,185 180,200 Q175,205 170,198 Q168,175 164,168Z" fill="#888898"/>

  <!-- Wizard hat -->
  <path d="M125,158 Q130,130 150,90 Q170,130 175,158Z" fill="#1a1060" stroke="#4040aa" stroke-width="2"/>
  <ellipse cx="150" cy="158" rx="32" ry="8" fill="#2a2080" stroke="#5050b0" stroke-width="1.5"/>
  <!-- Hat star -->
  <polygon points="150,100 152,108 160,108 154,113 156,121 150,116 144,121 146,113 140,108 148,108"
           fill="#ffd700" filter="url(#glow)"/>
  <!-- Hat band with moons -->
  <rect x="120" y="152" width="60" height="10" rx="3" fill="#3a2080"/>
  <g fill="#ffe060" opacity="0.8">
    <path d="M130,157 Q133,153 136,157 Q133,161 130,157Z"/>
    <path d="M148,157 Q151,153 154,157 Q151,161 148,157Z"/>
    <path d="M163,157 Q166,153 169,157 Q166,161 163,157Z"/>
  </g>

  <!-- Eyes with magic glow -->
  <circle cx="143" cy="165" r="4" fill="#1a1060"/>
  <circle cx="157" cy="165" r="4" fill="#1a1060"/>
  <circle cx="143" cy="165" r="2.5" fill="#6080ff" filter="url(#softglow)"/>
  <circle cx="157" cy="165" r="2.5" fill="#6080ff" filter="url(#softglow)"/>

  <!-- NAME BANNER -->
  <rect x="20" y="322" width="260" height="36" rx="8" fill="#050520" stroke="#4040cc" stroke-width="2"/>
  <text x="150" y="345" text-anchor="middle" font-family="Georgia, serif"
        font-size="16" font-weight="bold" fill="#8080ff" letter-spacing="2">✦ WIZARD ✦</text>

  <!-- Roll badge -->
  <circle cx="255" cy="40" r="20" fill="#050520" stroke="#4040cc" stroke-width="2"/>
  <text x="255" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8080ff">ROLL</text>
  <text x="255" y="51" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#c0c0ff">4+</text>

  <!-- Class gem -->
  <polygon points="38,32 48,22 58,32 48,42" fill="#3030cc" stroke="#6060ff" stroke-width="1.5" filter="url(#glow)"/>
</svg>
